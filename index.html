<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기초학력 지도 달력</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'BMJUA';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/BMJUA.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'BMDOHYEON';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/BMDOHYEON.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    body {
      font-family: 'BMDOHYEON', sans-serif;
    }
    .title-font {
      font-family: 'BMJUA', sans-serif;
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .zoom-in { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <!-- 메인 달력 컨테이너 -->
  <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[90vh] md:h-auto md:min-h-[700px]">
    
    <!-- 헤더 부분 -->
    <div class="bg-indigo-400 text-white p-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center justify-between w-full md:w-auto gap-4">
        <div class="flex items-center gap-3">
          <h1 class="text-3xl tracking-wide title-font">기초학력 지도 달력</h1>
          <!-- 연결 상태 표시 -->
          <span id="cloud-status" class="hidden sm:block text-xs px-2 py-1 rounded-full bg-yellow-400/90 text-white shadow-sm">
            로컬 저장 모드 (기기에 저장됨)
          </span>
        </div>
        <!-- 명단 설정 버튼 -->
        <button onclick="openSettingsModal()" class="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors focus:outline-none ml-auto" title="학생 명단 설정">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      
      <div class="flex items-center space-x-6">
        <button id="btn-prev-month" class="p-2 hover:bg-indigo-300 rounded-full transition-colors focus:outline-none">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h2 id="current-month-display" class="text-xl w-32 text-center tracking-wider">
          <!-- 년/월 표시 -->
        </h2>
        <button id="btn-next-month" class="p-2 hover:bg-indigo-300 rounded-full transition-colors focus:outline-none">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <!-- 범례 (Legend) -->
    <div class="bg-white px-6 py-4 border-b flex justify-end gap-6 text-sm md:text-base">
      <div class="flex items-center gap-2">
        <div class="w-4 h-4 rounded-full bg-sky-300"></div>
        <span class="text-gray-700 tracking-wide">중위권</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-4 h-4 rounded-full bg-rose-300"></div>
        <span class="text-gray-700 tracking-wide">1순위</span>
      </div>
    </div>

    <!-- 달력 본문 -->
    <div class="flex-1 p-6 flex flex-col">
      <!-- 요일 헤더 -->
      <div class="grid grid-cols-7 gap-1 mb-2 text-lg tracking-wide text-center">
        <div class="pb-2 text-rose-400">일</div>
        <div class="pb-2 text-gray-600">월</div>
        <div class="pb-2 text-gray-600">화</div>
        <div class="pb-2 text-gray-600">수</div>
        <div class="pb-2 text-gray-600">목</div>
        <div class="pb-2 text-gray-600">금</div>
        <div class="pb-2 text-sky-400">토</div>
      </div>

      <!-- 날짜 그리드 -->
      <div id="calendar-days" class="grid grid-cols-7 gap-2 flex-1">
        <!-- JS로 날짜 셀들이 생성됩니다 -->
      </div>
    </div>
  </div>

  <!-- 날짜 선택 모달 (팝업) -->
  <div id="date-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60] fade-in">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden zoom-in">
      <div class="flex justify-between items-center p-4 border-b">
        <h3 id="modal-date-title" class="text-xl text-gray-800 tracking-wide">
          <!-- 모달 날짜 타이틀 -->
        </h3>
        <button onclick="closeModal()" class="p-1 hover:bg-gray-100 rounded-full transition-colors text-gray-500 focus:outline-none">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      
      <div class="p-6 space-y-6">
        <p class="text-sm text-gray-500 text-center tracking-wide">
          해당 날짜에 지도한 학생을 선택하세요.
        </p>
        
        <!-- 중위권 학생 선택 -->
        <div>
          <h4 class="text-lg text-sky-600 mb-3 flex items-center gap-2 tracking-wide">
            <div class="w-3 h-3 rounded-full bg-sky-400"></div>
            중위권
          </h4>
          <div id="modal-mid-buttons" class="grid grid-cols-2 gap-3">
            <!-- JS로 버튼 생성 -->
          </div>
        </div>

        <!-- 1순위 학생 선택 -->
        <div>
          <h4 class="text-lg text-rose-600 mb-3 flex items-center gap-2 tracking-wide">
            <div class="w-3 h-3 rounded-full bg-rose-400"></div>
            1순위
          </h4>
          <div id="modal-top-buttons" class="grid grid-cols-2 gap-3">
            <!-- JS로 버튼 생성 -->
          </div>
        </div>
      </div>
      
      <div class="p-4 bg-gray-50">
        <button onclick="closeModal()" class="w-full py-3 bg-gray-700 text-white rounded-xl text-lg hover:bg-gray-600 transition-colors tracking-wide focus:outline-none">
          닫기
        </button>
      </div>
    </div>
  </div>

  <!-- 학생 설정 모달 (팝업) -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 fade-in">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col max-h-[90vh] zoom-in">
      <div class="flex justify-between items-center p-4 border-b shrink-0">
        <h3 class="text-xl text-gray-800 tracking-wide">학생 명단 설정</h3>
        <button onclick="closeSettingsModal()" class="p-1 hover:bg-gray-100 rounded-full transition-colors text-gray-500 focus:outline-none">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      
      <div class="p-6 space-y-6 overflow-y-auto">
        <!-- 중위권 추가/삭제 -->
        <div>
          <h4 class="text-lg text-sky-600 mb-3 flex items-center gap-2 tracking-wide">
            <div class="w-3 h-3 rounded-full bg-sky-400"></div>
            중위권 명단
          </h4>
          <div class="flex gap-2 mb-3">
            <input type="text" id="new-mid-student" class="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-300" placeholder="이름 입력" onkeypress="if(event.key==='Enter') addStudent('midLevel')">
            <button onclick="addStudent('midLevel')" class="bg-sky-400 text-white px-4 rounded-xl hover:bg-sky-500 transition-colors shrink-0">추가</button>
          </div>
          <div id="settings-mid-list" class="flex flex-wrap gap-2">
            <!-- JS로 학생 목록 칩 생성 -->
          </div>
        </div>

        <!-- 1순위 추가/삭제 -->
        <div>
          <h4 class="text-lg text-rose-600 mb-3 flex items-center gap-2 tracking-wide">
            <div class="w-3 h-3 rounded-full bg-rose-400"></div>
            1순위 명단
          </h4>
          <div class="flex gap-2 mb-3">
            <input type="text" id="new-top-student" class="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-rose-300" placeholder="이름 입력" onkeypress="if(event.key==='Enter') addStudent('topPriority')">
            <button onclick="addStudent('topPriority')" class="bg-rose-400 text-white px-4 rounded-xl hover:bg-rose-500 transition-colors shrink-0">추가</button>
          </div>
          <div id="settings-top-list" class="flex flex-wrap gap-2">
            <!-- JS로 학생 목록 칩 생성 -->
          </div>
        </div>
      </div>
      
      <div class="p-4 bg-gray-50 border-t shrink-0">
        <button onclick="closeSettingsModal()" class="w-full py-3 bg-gray-700 text-white rounded-xl text-lg hover:bg-gray-600 transition-colors tracking-wide focus:outline-none">
          저장 및 닫기
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    // =========================================================================
    // 1. 상태 변수 및 로컬 스토리지 데이터 불러오기 (최우선 실행)
    // =========================================================================
    const LOCAL_RECORDS_KEY = 'edu_calendar_records_v1';
    const LOCAL_STUDENTS_KEY = 'edu_calendar_students_v1';

    let currentDate = new Date();
    let selectedDate = null;
    let db = null;
    let currentUser = null;
    let appId = 'my-calendar-app';

    // 파이어베이스 접속이 안 되더라도 저장된 기록을 브라우저(기기)에서 불러옵니다.
    window.STUDENTS = JSON.parse(localStorage.getItem(LOCAL_STUDENTS_KEY)) || {
      midLevel: ['이솔빛나', '황혜리'],
      topPriority: ['전성후', '강주연']
    };
    let records = JSON.parse(localStorage.getItem(LOCAL_RECORDS_KEY)) || {};

    // 유틸리티 함수
    const formatDateString = (y, m, d) => {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    };

    // =========================================================================
    // 2. 핵심 UI 렌더링 함수 (무조건 화면부터 그립니다)
    // =========================================================================
    window.renderCalendar = function() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDayOfMonth = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();

      document.getElementById('current-month-display').textContent = `${year}년 ${month + 1}월`;
      let daysHtml = '';
      
      for (let i = 0; i < firstDayOfMonth; i++) {
        daysHtml += `<div class="border border-transparent rounded-xl p-2 bg-gray-50 min-h-[80px] md:min-h-[100px]"></div>`;
      }

      for (let i = 1; i <= daysInMonth; i++) {
        const dateStr = formatDateString(year, month, i);
        const dayRecord = records[dateStr];
        const isToday = (i === today.getDate() && month === today.getMonth() && year === today.getFullYear());
        const weekdayIndex = new Date(year, month, i).getDay();
        
        const textColor = weekdayIndex === 0 ? 'text-rose-400' : weekdayIndex === 6 ? 'text-sky-400' : 'text-gray-700';
        const todayBg = isToday ? 'bg-gray-200' : '';
        const todayRing = isToday ? 'ring-2 ring-indigo-400 ring-inset' : 'border-gray-200';

        let tagsHtml = '';
        if (dayRecord) {
          if (dayRecord.midLevel) {
            dayRecord.midLevel.forEach(name => {
              tagsHtml += `<div class="text-[11px] md:text-sm bg-sky-100 text-sky-700 px-1.5 py-0.5 rounded-md truncate text-center shadow-sm tracking-wide mt-1" title="${name} (중위권)">${name}</div>`;
            });
          }
          if (dayRecord.topPriority) {
            dayRecord.topPriority.forEach(name => {
              tagsHtml += `<div class="text-[11px] md:text-sm bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded-md truncate text-center shadow-sm tracking-wide mt-1" title="${name} (1순위)">${name}</div>`;
            });
          }
        }

        daysHtml += `
          <div onclick="openModal('${dateStr}')" class="border rounded-xl p-2 flex flex-col min-h-[80px] md:min-h-[100px] transition-all bg-white cursor-pointer hover:border-indigo-300 hover:shadow-md ${todayRing}">
            <div class="flex justify-between items-start mb-1">
              <span class="text-base flex items-center justify-center w-7 h-7 rounded-full ${todayBg} ${textColor}">
                ${i}
              </span>
            </div>
            <div class="mt-auto flex flex-col gap-0.5">
              ${tagsHtml}
            </div>
          </div>
        `;
      }
      document.getElementById('calendar-days').innerHTML = daysHtml;
    };

    window.renderModalContent = function() {
      if (!selectedDate) return;
      const parts = selectedDate.split('-');
      document.getElementById('modal-date-title').textContent = `${parts[0]}년 ${parts[1]}월 ${parts[2]}일`;
      const dayRecord = records[selectedDate] || { midLevel: [], topPriority: [] };

      // 중위권
      let midHtml = '';
      if(window.STUDENTS.midLevel.length === 0) {
        midHtml = `<div class="col-span-2 text-center text-sm text-gray-400 py-2">설정에서 추가해주세요.</div>`;
      } else {
        window.STUDENTS.midLevel.forEach(name => {
          const isSelected = dayRecord.midLevel && dayRecord.midLevel.includes(name);
          const btnClass = isSelected ? 'border-sky-300 bg-sky-300 text-white shadow-md' : 'border-gray-200 hover:border-sky-200 text-gray-600 bg-white';
          midHtml += `<button onclick="toggleStudent('midLevel', '${name}')" class="p-3 rounded-xl border-2 transition-all text-lg tracking-wide ${btnClass}">${name}</button>`;
        });
      }
      document.getElementById('modal-mid-buttons').innerHTML = midHtml;

      // 1순위
      let topHtml = '';
      if(window.STUDENTS.topPriority.length === 0) {
        topHtml = `<div class="col-span-2 text-center text-sm text-gray-400 py-2">설정에서 추가해주세요.</div>`;
      } else {
        window.STUDENTS.topPriority.forEach(name => {
          const isSelected = dayRecord.topPriority && dayRecord.topPriority.includes(name);
          const btnClass = isSelected ? 'border-rose-300 bg-rose-300 text-white shadow-md' : 'border-gray-200 hover:border-rose-200 text-gray-600 bg-white';
          topHtml += `<button onclick="toggleStudent('topPriority', '${name}')" class="p-3 rounded-xl border-2 transition-all text-lg tracking-wide ${btnClass}">${name}</button>`;
        });
      }
      document.getElementById('modal-top-buttons').innerHTML = topHtml;
    };

    window.renderSettingsModalContent = function() {
      const midList = document.getElementById('settings-mid-list');
      midList.innerHTML = window.STUDENTS.midLevel.map(name => `
        <div class="flex items-center gap-1 bg-sky-100 text-sky-700 px-3 py-1.5 rounded-full text-sm font-sans font-bold tracking-wider">
          <span>${name}</span>
          <button onclick="removeStudent('midLevel', '${name}')" class="hover:bg-sky-200 rounded-full p-0.5 transition-colors focus:outline-none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      `).join('');

      const topList = document.getElementById('settings-top-list');
      topList.innerHTML = window.STUDENTS.topPriority.map(name => `
        <div class="flex items-center gap-1 bg-rose-100 text-rose-700 px-3 py-1.5 rounded-full text-sm font-sans font-bold tracking-wider">
          <span>${name}</span>
          <button onclick="removeStudent('topPriority', '${name}')" class="hover:bg-rose-200 rounded-full p-0.5 transition-colors focus:outline-none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      `).join('');
    };

    // ★ 가장 먼저 화면을 무조건 그립니다! ★
    renderCalendar();

    // =========================================================================
    // 3. 사용자 상호작용 (클릭) 이벤트
    // =========================================================================
    window.openModal = (dateStr) => { selectedDate = dateStr; document.getElementById('date-modal').classList.remove('hidden'); renderModalContent(); };
    window.closeModal = () => { selectedDate = null; document.getElementById('date-modal').classList.add('hidden'); };
    window.openSettingsModal = () => { document.getElementById('settings-modal').classList.remove('hidden'); renderSettingsModalContent(); };
    window.closeSettingsModal = () => { document.getElementById('settings-modal').classList.add('hidden'); };

    // 학생 달력 기록 토글
    window.toggleStudent = async (type, name) => {
      if (!selectedDate) return;
      const current = records[selectedDate] || { midLevel: [], topPriority: [] };
      const typeArray = current[type] || [];
      const isSelected = typeArray.includes(name);

      const newTypeArray = isSelected ? typeArray.filter((n) => n !== name) : [...typeArray, name];
      records[selectedDate] = { ...current, [type]: newTypeArray };

      // 1. 기기 로컬 스토리지에 즉시 백업 저장 (무조건 작동)
      localStorage.setItem(LOCAL_RECORDS_KEY, JSON.stringify(records));
      renderCalendar();
      renderModalContent();

      // 2. 파이어베이스 연동 시 클라우드 저장
      if (db && currentUser) {
        import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js").then(({ doc, setDoc }) => {
          const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'records', selectedDate);
          setDoc(docRef, records[selectedDate]).catch(e => console.error(e));
        });
      }
    };

    // 학생 명단 추가
    window.addStudent = (type) => {
      const inputId = type === 'midLevel' ? 'new-mid-student' : 'new-top-student';
      const inputEl = document.getElementById(inputId);
      const name = inputEl.value.trim();
      
      if (!name || window.STUDENTS[type].includes(name)) { inputEl.value = ''; return; }
      window.STUDENTS[type].push(name);
      inputEl.value = '';
      
      // 기기 로컬 스토리지에 즉시 백업 저장
      localStorage.setItem(LOCAL_STUDENTS_KEY, JSON.stringify(window.STUDENTS));
      renderSettingsModalContent();
      syncStudentsToCloud();
    };

    // 학생 명단 삭제
    window.removeStudent = (type, name) => {
      window.STUDENTS[type] = window.STUDENTS[type].filter(n => n !== name);
      localStorage.setItem(LOCAL_STUDENTS_KEY, JSON.stringify(window.STUDENTS)); // 기기 백업
      renderSettingsModalContent();
      syncStudentsToCloud();
    };

    // 파이어베이스 연동 시 클라우드 명단 동기화
    window.syncStudentsToCloud = () => {
      if (db && currentUser) {
        import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js").then(({ doc, setDoc }) => {
          const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'students');
          setDoc(docRef, window.STUDENTS).catch(e => console.error(e));
        });
      }
    }

    document.getElementById('btn-prev-month').addEventListener('click', () => {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
      renderCalendar();
    });

    document.getElementById('btn-next-month').addEventListener('click', () => {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
      renderCalendar();
    });

    // =========================================================================
    // 4. 클라우드 (파이어베이스) 동적 연결 시도 (에러가 나도 화면은 멈추지 않음)
    // =========================================================================
    const myFirebaseConfig = {
      apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: ""
    };

    async function initCloud() {
      let firebaseConfig = myFirebaseConfig;
      let isCanvasEnvironment = typeof __firebase_config !== 'undefined';
      
      if (isCanvasEnvironment) {
        try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
        appId = typeof __app_id !== 'undefined' ? __app_id : appId;
      }

      // 파이어베이스 주소가 아예 없으면 여기서 멈춥니다. (로컬 스토리지 모드 유지)
      if (!firebaseConfig.apiKey) return;

      try {
        // 네트워크 차단 상황을 대비해 모듈을 동적으로(비동기) 불러옵니다.
        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
        const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
        const { getFirestore, collection, doc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        if (isCanvasEnvironment && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }

        onAuthStateChanged(auth, (user) => {
          currentUser = user;
          const statusEl = document.getElementById('cloud-status');
          
          if (user) {
            statusEl.textContent = '클라우드 연동됨';
            statusEl.className = 'hidden sm:block text-xs px-2 py-1 rounded-full bg-green-500/90 text-white shadow-sm';
            
            // 데이터 동기화
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'records'), (snapshot) => {
              snapshot.forEach((doc) => { records[doc.id] = doc.data(); });
              localStorage.setItem(LOCAL_RECORDS_KEY, JSON.stringify(records)); // 클라우드 내용 로컬 덮어쓰기
              renderCalendar();
              if (selectedDate) renderModalContent();
            });

            onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'students'), (docSnap) => {
              if (docSnap.exists()) {
                window.STUDENTS = docSnap.data();
                localStorage.setItem(LOCAL_STUDENTS_KEY, JSON.stringify(window.STUDENTS));
              } else {
                syncStudentsToCloud(); // 초기 데이터 클라우드 업로드
              }
              if (!document.getElementById('settings-modal').classList.contains('hidden')) renderSettingsModalContent();
              if (selectedDate) renderModalContent();
            });
          }
        });

      } catch (error) {
        console.warn("클라우드 연결 실패. 로컬 모드로 작동합니다.", error);
      }
    }

    initCloud();
  </script>
</body>
</html>
